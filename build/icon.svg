<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b28"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </linearGradient>
    <!-- Glow filter for arcs -->
    <filter id="arc-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for the tower node -->
    <filter id="node-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS rounded rect background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle inner border for depth -->
  <rect x="4" y="4" width="1016" height="1016" rx="226" ry="226" fill="none" stroke="#1e2536" stroke-width="2"/>

  <!-- Main composition centered -->
  <g transform="translate(512, 530)">

    <!-- Tower structure — geometric, bold -->
    <!-- Main vertical mast -->
    <line x1="0" y1="-200" x2="0" y2="240" stroke="#7aa2f7" stroke-width="22" stroke-linecap="round"/>

    <!-- Upper crossbar -->
    <line x1="-40" y1="60" x2="40" y2="60" stroke="#7aa2f7" stroke-width="14" stroke-linecap="round"/>

    <!-- Lower crossbar -->
    <line x1="-60" y1="160" x2="60" y2="160" stroke="#7aa2f7" stroke-width="14" stroke-linecap="round"/>

    <!-- Left truss — upper crossbar to lower crossbar -->
    <line x1="-40" y1="60" x2="-60" y2="160" stroke="#7aa2f7" stroke-width="10" stroke-linecap="round"/>
    <!-- Right truss -->
    <line x1="40" y1="60" x2="60" y2="160" stroke="#7aa2f7" stroke-width="10" stroke-linecap="round"/>

    <!-- Base legs — from lower crossbar outward -->
    <line x1="-60" y1="160" x2="-100" y2="280" stroke="#7aa2f7" stroke-width="12" stroke-linecap="round"/>
    <line x1="60" y1="160" x2="100" y2="280" stroke="#7aa2f7" stroke-width="12" stroke-linecap="round"/>

    <!-- Ground base -->
    <line x1="-120" y1="280" x2="120" y2="280" stroke="#7aa2f7" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

    <!-- Tower node at top — bright focal point -->
    <circle cx="0" cy="-200" r="28" fill="#7aa2f7" filter="url(#node-glow)" opacity="0.8"/>
    <circle cx="0" cy="-200" r="16" fill="#d7dce8"/>

    <!-- Signal arcs — radiating upward from tower top -->
    <g filter="url(#arc-glow)">
      <!-- Arc 1 — innermost, strongest -->
      <path d="M -80,-280 A 100,100 0 0,1 80,-280"
            fill="none" stroke="#e0af68" stroke-width="14" stroke-linecap="round" opacity="1.0"/>

      <!-- Arc 2 — middle -->
      <path d="M -140,-330 A 170,170 0 0,1 140,-330"
            fill="none" stroke="#e0af68" stroke-width="11" stroke-linecap="round" opacity="0.65"/>

      <!-- Arc 3 — outermost -->
      <path d="M -195,-375 A 240,240 0 0,1 195,-375"
            fill="none" stroke="#e0af68" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    </g>
  </g>
</svg>