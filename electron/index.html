<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Augment</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-base: #0f1115;
        --bg-surface: #131822;
        --bg-elevated: #1a2130;
        --bg-highlight: #243157;
        --border-dim: #1e2536;
        --border-default: #272c36;
        --border-accent: #4f6ad2;
        --text-primary: #d7dce8;
        --text-secondary: #8f9abb;
        --text-dim: #555e78;
        --accent-blue: #7aa2f7;
        --accent-green: #9ece6a;
        --accent-yellow: #e0af68;
        --accent-red: #f7768e;
        --accent-purple: #bb9af7;
        --sidebar-width: 260px;
        --context-width: 280px;
        --transition-fast: 150ms ease;
        --transition-normal: 250ms ease;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      /* ============================================================
         Layout: sidebar | focus | context
         ============================================================ */
      #app {
        display: grid;
        grid-template-columns: var(--sidebar-width) 1fr var(--context-width);
        width: 100%;
        height: 100%;
        transition: grid-template-columns 200ms ease;
      }

      #app.sidebar-collapsed {
        grid-template-columns: 0px 1fr var(--context-width);
      }

      #app.context-collapsed {
        grid-template-columns: var(--sidebar-width) 1fr 0px;
      }

      #app.sidebar-collapsed.context-collapsed {
        grid-template-columns: 0px 1fr 0px;
      }

      /* ============================================================
         Sidebar (dispatch list)
         ============================================================ */
      #sidebar {
        display: flex;
        flex-direction: column;
        background: var(--bg-surface);
        border-right: 1px solid var(--border-default);
        overflow: hidden;
        min-width: 0;
      }

      .sidebar-collapsed #sidebar {
        display: none;
      }

      #sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 8px;
        padding-left: 78px; /* space for macOS traffic lights */
        flex-shrink: 0;
        -webkit-app-region: drag;
      }

      #sidebar-header button {
        -webkit-app-region: no-drag;
      }

      #sidebar-header h2 {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
      }

      .sidebar-actions {
        display: flex;
        gap: 4px;
      }

      .sidebar-actions button {
        border: none;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
        font-size: 16px;
        line-height: 1;
      }

      .sidebar-actions button:hover {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      /* Attention queue banner */
      #attention-banner {
        display: none;
        align-items: center;
        gap: 8px;
        margin: 0 10px 8px;
        padding: 8px 10px;
        background: rgba(224, 175, 104, 0.08);
        border: 1px solid rgba(224, 175, 104, 0.2);
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        color: var(--accent-yellow);
        transition: background var(--transition-fast);
      }

      #attention-banner:hover {
        background: rgba(224, 175, 104, 0.14);
      }

      #attention-banner.visible {
        display: flex;
      }

      #attention-count {
        font-weight: 700;
        font-size: 14px;
      }

      #attention-label {
        flex: 1;
      }

      #attention-shortcut {
        font-size: 10px;
        opacity: 0.7;
        font-family: "SF Mono", Menlo, monospace;
      }

      /* Session list */
      #session-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 6px 12px;
      }

      #session-list::-webkit-scrollbar {
        width: 4px;
      }

      #session-list::-webkit-scrollbar-thumb {
        background: var(--border-default);
        border-radius: 2px;
      }

      .session-group-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--text-dim);
        padding: 12px 8px 4px;
      }

      .session-card {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 8px 10px;
        margin: 2px 0;
        border-radius: 6px;
        cursor: pointer;
        transition: background var(--transition-fast);
        border: 1px solid transparent;
      }

      .session-card:hover {
        background: var(--bg-elevated);
      }

      .session-card.is-active {
        background: var(--bg-highlight);
        border-color: var(--border-accent);
      }

      .session-card-header {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--text-dim);
      }

      .status-dot.active { background: var(--accent-green); }
      .status-dot.tool { background: var(--accent-blue); }
      .status-dot.idle { background: var(--text-dim); }
      .status-dot.waiting { background: var(--accent-yellow); animation: pulse 2s ease-in-out infinite; }
      .status-dot.error { background: var(--accent-red); }
      .status-dot.exited { background: var(--text-dim); opacity: 0.4; }
      .status-dot.shell { background: var(--text-secondary); }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .session-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "SF Mono", "Fira Code", Menlo, monospace;
      }

      /* Inline rename input */
      .session-name-input {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        background: var(--bg-base);
        border: 1px solid var(--border-accent);
        border-radius: 3px;
        padding: 0 4px;
        flex: 1;
        min-width: 0;
        font-family: "SF Mono", "Fira Code", Menlo, monospace;
        outline: none;
      }

      #focus-session-name-input {
        font-family: "SF Mono", "Fira Code", Menlo, monospace;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        background: var(--bg-base);
        border: 1px solid var(--border-accent);
        border-radius: 3px;
        padding: 1px 6px;
        outline: none;
        min-width: 80px;
      }

      .session-badge {
        font-size: 10px;
        font-weight: 600;
        background: var(--accent-yellow);
        color: var(--bg-base);
        border-radius: 8px;
        padding: 1px 6px;
        flex-shrink: 0;
      }

      .session-status-line {
        font-size: 11px;
        color: var(--text-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding-left: 15px;
      }

      .session-unread {
        font-size: 9px;
        font-weight: 700;
        background: var(--accent-blue);
        color: var(--bg-base);
        border-radius: 8px;
        padding: 1px 5px;
        flex-shrink: 0;
        min-width: 16px;
        text-align: center;
      }

      .session-team-summary {
        font-size: 10px;
        color: var(--text-dim);
        padding-left: 15px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 2px;
      }

      .session-team-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 4px 0 0 15px;
        align-items: center;
      }

      .session-team-name {
        font-size: 10px;
        color: var(--accent-blue);
        font-weight: 600;
      }

      .session-team-members {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
      }

      .session-member-chip {
        font-size: 9px;
        font-weight: 500;
        color: var(--text-secondary);
        background: var(--bg-elevated);
        border: 1px solid var(--border-dim);
        border-radius: 10px;
        padding: 1px 7px;
        cursor: pointer;
        transition: border-color 100ms, color 100ms;
      }

      .session-member-chip:hover {
        border-color: var(--border-accent);
        color: var(--text-primary);
      }

      .session-card .close-btn {
        display: none;
        border: none;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .session-card:hover .close-btn {
        display: block;
      }

      .session-card .close-btn:hover {
        color: var(--accent-red);
      }

      /* New session button */
      #new-session-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin: 0 10px 12px;
        padding: 8px;
        border: 1px dashed var(--border-default);
        background: transparent;
        color: var(--text-secondary);
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all var(--transition-fast);
        flex-shrink: 0;
      }

      #new-session-btn:hover {
        border-color: var(--border-accent);
        color: var(--text-primary);
        background: var(--bg-elevated);
      }

      /* ============================================================
         Focus pane (main terminal)
         ============================================================ */
      #focus-area {
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg-base);
      }

      #focus-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-default);
        flex-shrink: 0;
        min-height: 36px;
        -webkit-app-region: drag;
      }

      #focus-header button, #focus-header span {
        -webkit-app-region: no-drag;
      }

      #focus-header .status-dot {
        width: 9px;
        height: 9px;
      }

      #focus-session-name {
        font-family: "SF Mono", "Fira Code", Menlo, monospace;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
      }

      #focus-status-text {
        font-size: 11px;
        color: var(--text-secondary);
        flex: 1;
      }

      #focus-nav {
        display: flex;
        gap: 4px;
      }

      #focus-nav button {
        border: 1px solid var(--border-default);
        background: var(--bg-elevated);
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-family: "SF Mono", Menlo, monospace;
        transition: border-color 100ms, color 100ms;
      }

      #focus-nav button:hover {
        border-color: var(--border-accent);
        color: var(--text-primary);
      }

      #focus-terminal-container {
        flex: 1;
        overflow: hidden;
        padding: 4px;
        position: relative;
      }

      .terminal-root {
        width: 100%;
        height: 100%;
      }

      /* Empty state */
      #focus-empty {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        color: var(--text-dim);
      }

      #focus-empty.visible {
        display: flex;
      }

      #focus-empty .empty-icon {
        font-size: 48px;
        opacity: 0.3;
      }

      #focus-empty .empty-text {
        font-size: 14px;
      }

      #focus-empty .empty-hint {
        font-size: 11px;
        font-family: "SF Mono", Menlo, monospace;
      }

      /* ============================================================
         Context pane (near-context preview)
         ============================================================ */
      #context-area {
        display: flex;
        flex-direction: column;
        background: var(--bg-surface);
        border-left: 1px solid var(--border-default);
        overflow: hidden;
        min-width: 0;
      }

      .context-collapsed #context-area {
        display: none;
      }

      #context-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px 6px;
        flex-shrink: 0;
        -webkit-app-region: drag;
      }

      #context-header h3 {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--text-dim);
      }

      #collapse-context-btn:hover {
        opacity: 1 !important;
        background: var(--bg-elevated) !important;
      }

      #context-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 8px 8px;
      }

      #context-list::-webkit-scrollbar {
        width: 4px;
      }

      #context-list::-webkit-scrollbar-thumb {
        background: var(--border-default);
        border-radius: 2px;
      }

      .context-card {
        margin: 4px 0;
        padding: 8px 10px;
        background: var(--bg-elevated);
        border-radius: 6px;
        border: 1px solid var(--border-dim);
        cursor: pointer;
        transition: border-color var(--transition-fast);
      }

      .context-card:hover {
        border-color: var(--border-accent);
      }

      .context-card-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
      }

      .context-card .status-dot {
        width: 6px;
        height: 6px;
      }

      .context-card .session-name {
        font-size: 11px;
        font-weight: 600;
      }

      .context-card-status {
        font-size: 10px;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      .context-card-preview {
        font-family: "SF Mono", "Fira Code", Menlo, monospace;
        font-size: 10px;
        line-height: 1.4;
        color: var(--text-dim);
        max-height: 84px;
        overflow: hidden;
        white-space: pre-wrap;
        word-break: break-all;
        background: var(--bg-base);
        border-radius: 4px;
        padding: 4px 6px;
      }

      /* ============================================================
         Hidden terminal panes (not focused)
         ============================================================ */
      #panes {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .pane {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        pointer-events: none;
        transform: translateX(40px);
        transition: opacity 200ms ease, transform 200ms ease;
        will-change: opacity, transform;
      }

      .pane.is-active {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0);
        z-index: 1;
      }

      .pane.slide-out-left {
        opacity: 0;
        transform: translateX(-40px);
      }

      .pane.slide-out-right {
        opacity: 0;
        transform: translateX(40px);
      }

      /* ============================================================
         Global keyboard hint toast
         ============================================================ */
      #key-hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-highlight);
        border: 1px solid var(--border-accent);
        color: var(--text-primary);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 12px;
        font-family: "SF Mono", Menlo, monospace;
        opacity: 0;
        transition: opacity 200ms ease;
        pointer-events: none;
        z-index: 100;
      }

      #key-hint.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Sidebar: dispatch list -->
      <div id="sidebar">
        <div id="sidebar-header">
          <h2>Sessions</h2>
          <div class="sidebar-actions">
            <button id="collapse-sidebar-btn" title="Toggle sidebar (Cmd+B)">&#x25C0;</button>
          </div>
        </div>

        <div id="attention-banner" title="Go to next (Cmd+J)">
          <span id="attention-count">0</span>
          <span id="attention-label">need attention</span>
          <span id="attention-shortcut">&#x2318;J</span>
        </div>

        <div id="session-list"></div>

        <button id="new-session-btn" type="button">+ new session</button>
      </div>

      <!-- Focus: main terminal -->
      <div id="focus-area">
        <div id="focus-header">
          <div id="focus-dot" class="status-dot"></div>
          <span id="focus-session-name"></span>
          <span id="focus-status-text"></span>
          <div id="focus-nav">
            <button id="prev-btn" title="Previous (Cmd+Shift+[)">&#x25C0;</button>
            <button id="next-btn" title="Next (Cmd+Shift+])">&#x25B6;</button>
            <button id="go-next-btn" title="Go to next needing attention (Cmd+J)">&#x26A1;</button>
          </div>
        </div>
        <div id="focus-terminal-container">
          <div id="panes"></div>
        </div>
        <div id="focus-empty">
          <div class="empty-icon">&#x25A0;</div>
          <div class="empty-text">No sessions</div>
          <div class="empty-hint">Press Cmd+T to create a session</div>
        </div>
      </div>

      <!-- Context: near-context preview -->
      <div id="context-area">
        <div id="context-header">
          <h3>Nearby</h3>
          <button id="collapse-context-btn" title="Toggle context pane (Cmd+\)" style="border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px;-webkit-app-region:no-drag;opacity:0.7;transition:opacity 150ms;">&#x25B6;</button>
        </div>
        <div id="context-list"></div>
      </div>
    </div>

    <div id="key-hint"></div>

    <script src="./renderer.js"></script>
  </body>
</html>
