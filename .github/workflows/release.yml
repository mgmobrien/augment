name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/augment-pty/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Build Go binaries
        working-directory: cmd/augment-pty
        run: |
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o ../../scripts/augment-pty-darwin-arm64 .
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o ../../scripts/augment-pty-linux-x64 .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -o ../../scripts/augment-pty-linux-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ../../scripts/augment-pty-win32-x64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            versions.json
            styles.css
            scripts/augment-pty-darwin-arm64
            scripts/augment-pty-linux-x64
            scripts/augment-pty-linux-arm64
            scripts/augment-pty-win32-x64.exe
